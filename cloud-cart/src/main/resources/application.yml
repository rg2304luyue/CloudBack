server:
  port: 8084

spring:
  application:
    name: cloud-cart
  data:
    redis:
      host: ${REDIS_ADDR:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yml
    sentinel:
      transport:
        dashboard: ${SENTINEL_ADDR:localhost:8858}
      eager: true

knife4j:
  enable: true
