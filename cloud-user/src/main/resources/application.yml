server:
  port: 8083

spring:
  application:
    name: cloud-user
  datasource:
    url: jdbc:mysql://${MYSQL_ADDR:localhost:3306}/cloud_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yml
    sentinel:
      transport:
        dashboard: ${SENTINEL_ADDR:localhost:8858}
      eager: true

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true
