server:
  port: 8082

spring:
  application:
    name: cloud-product
  datasource:
    url: jdbc:mysql://${MYSQL_ADDR:${VM_HOST:localhost}:3306}/cloud_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:${VM_HOST:localhost}:8848}
        username: nacos
        password: nacos
      config:
        server-addr: ${NACOS_ADDR:${VM_HOST:localhost}:8848}
        file-extension: yml
        import-check.enabled: false
    sentinel:
      transport:
        dashboard: ${SENTINEL_ADDR:${VM_HOST:localhost}:8858}
      eager: true

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true

minio:
  endpoint: ${MINIO_ENDPOINT:${VM_HOST:localhost}:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin123456}
  bucket: ${MINIO_BUCKET:cloudmall-products}

meili:
  host: ${MEILI_HOST:${VM_HOST:localhost}}
  port: ${MEILI_PORT:7700}
  master-key: ${MEILI_MASTER_KEY:meili-master-key-change-me}