version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: cloud-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cloud_mall
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - cloud-net

  redis:
    image: redis:7.4-alpine
    container_name: cloud-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - cloud-net

  nacos:
    image: nacos/nacos-server:v2.5.1
    container_name: cloud-nacos
    restart: always
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root123
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      NACOS_AUTH_TOKEN_SECRET_KEY: SecretKey012345678901234567890123456789012345678901234567890123456789
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    depends_on:
      - mysql
    networks:
      - cloud-net

  kafka:
    image: bitnami/kafka:3.9
    container_name: cloud-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://192.168.1.100:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - cloud-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cloud-kafka-ui
    restart: always
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cloud-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - cloud-net

  sentinel:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: cloud-sentinel
    restart: always
    ports:
      - "8858:8858"
    environment:
      SERVER_PORT: 8858
      SENTINEL_DASHBOARD_AUTH_USERNAME: admin
      SENTINEL_DASHBOARD_AUTH_PASSWORD: admin123
    networks:
      - cloud-net

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  kafka-data:

networks:
  cloud-net:
    driver: bridge
