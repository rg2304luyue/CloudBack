version: '3.8'

# CloudBack 中间件编排（不含 MySQL / Redis，使用宿主机已有服务）
# Ubuntu 24.04 宿主机需已安装 MySQL 8.0+ 和 Redis 7.x

services:
  nacos:
    image: nacos/nacos-server:v2.5.1
    container_name: cloud-nacos
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: host.docker.internal
      MYSQL_SERVICE_PORT: ${MYSQL_PORT:-3306}
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: ${MYSQL_USER:-root}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD:-root}
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: nacos
      NACOS_AUTH_TOKEN: U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MTI=
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    networks:
      - cloud-net

  kafka:
    image: bitnamilegacy/kafka:3.9
    container_name: cloud-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_HOST:-localhost}:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - cloud-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cloud-kafka-ui
    restart: always
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cloud-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - cloud-net

  sentinel:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: cloud-sentinel
    restart: always
    ports:
      - "8858:8858"
    environment:
      SERVER_PORT: 8858
      SENTINEL_DASHBOARD_AUTH_USERNAME: admin
      SENTINEL_DASHBOARD_AUTH_PASSWORD: admin123
    networks:
      - cloud-net

  minio:
    image: minio/minio:latest
    container_name: cloud-minio
    restart: always
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web 控制台
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-admin123456}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - cloud-net

volumes:
  nacos-data:
  kafka-data:
  minio-data:

networks:
  cloud-net:
    driver: bridge
