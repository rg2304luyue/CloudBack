server:
  port: 8080

spring:
  application:
    name: cloud-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:${VM_HOST:localhost}:8848}
        namespace: ${NACOS_NAMESPACE:}
        username: nacos
        password: nacos
      config:
        server-addr: ${NACOS_ADDR:${VM_HOST:localhost}:8848}
        file-extension: yml
    sentinel:
      transport:
        dashboard: ${SENTINEL_ADDR:${VM_HOST:localhost}:8858}
      eager: true
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 认证服务
        - id: cloud-auth
          uri: lb://cloud-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        # 用户服务
        - id: cloud-user
          uri: lb://cloud-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        # 商品服务
        - id: cloud-product
          uri: lb://cloud-product
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=1
        # 购物车服务
        - id: cloud-cart
          uri: lb://cloud-cart
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1
        # 订单服务
        - id: cloud-order
          uri: lb://cloud-order
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
        # 支付服务
        - id: cloud-payment
          uri: lb://cloud-payment
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=1
